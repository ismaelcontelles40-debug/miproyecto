<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="bg-slate-100 text-slate-900">
    <header class="app-header">
      <h1>TaskFlow</h1>
      <p>Organiza tus tareas de forma sencilla</p>
    </header>

    <main class="app-layout">
      <section class="tasks-section" aria-labelledby="tasks-title">
        <form id="task-form" class="task-form">
          <label for="task-input">Nueva tarea</label>
          <input
            type="text"
            id="task-input"
            placeholder="Escribe una tarea..."
            required
          />
          <button type="submit">Añadir</button>
        </form>

        <div id="filters" class="filters" aria-label="Filtros de tareas">
          <button data-filter="all">Todas</button>
          <button data-filter="completed">Completadas</button>
          <button data-filter="pending">Pendientes</button>
        </div>

        <div class="search-box">
          <label for="search-input">Buscar tarea</label>
          <input type="text" id="search-input" placeholder="Buscar..." />
        </div>

        <h2 id="tasks-title">Lista de tareas</h2>
        <ul id="task-list" class="task-list"></ul>
      </section>

      <aside class="stats-panel" aria-labelledby="stats-title">
        <h2 id="stats-title">Estadísticas</h2>
        <p>Total: <span id="total">0</span></p>
        <p>Completadas: <span id="completed">0</span></p>
        <p>Pendientes: <span id="pending">0</span></p>
      </aside>
    </main>

    <footer class="footer">
      <p>Proyecto bootcamp</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
