<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header>
      <h1>TaskFlow</h1>
    </header>

    <!-- MAIN -->
    <main>
      <!-- FORMULARIO + FILTROS + BUSCADOR -->
      <section>
        <form id="task-form">
          <label for="task-input">Nueva tarea</label>
          <input
            type="text"
            id="task-input"
            placeholder="Escribe una tarea..."
            required
          />
          <button type="submit">Añadir</button>
        </form>

        <!-- FILTROS -->
        <div id="filters">
          <button data-filter="all">Todas</button>
          <button data-filter="completed">Completadas</button>
          <button data-filter="pending">Pendientes</button>
        </div>

        <!-- BUSCADOR -->
        <div id="search-container">
          <label for="search-input">Buscar tarea</label>
          <input
            type="text"
            id="search-input"
            placeholder="Buscar..."
          />
        </div>
      </section>

      <!-- LISTA -->
      <section>
        <h2>Lista de tareas</h2>
        <ul id="task-list"></ul>
      </section>

      <!-- ESTADÍSTICAS -->
      <aside>
        <h2>Estadísticas</h2>
        <p>Total: <span id="total">0</span></p>
        <p>Completadas: <span id="completed">0</span></p>
        <p>Pendientes: <span id="pending">0</span></p>
      </aside>
    </main>

    <!-- FOOTER -->
    <footer>
      <p>Proyecto bootcamp</p>
    </footer>

    <!-- SCRIPT -->
    <script src="app.js"></script>
  </body>
</html>
