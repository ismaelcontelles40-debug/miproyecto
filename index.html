<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page">
      <header class="app-header">
        <div>
          <h1>TaskFlow</h1>
          <p>Organiza tus tareas de forma sencilla</p>
        </div>

        <button id="theme-toggle" type="button">Modo oscuro</button>
      </header>

      <main class="app-layout">
        <section class="tasks-section" aria-labelledby="tasks-title">
          <form id="task-form" class="task-form">
            <div>
              <label for="task-input">Nueva tarea</label>
              <input
                type="text"
                id="task-input"
                placeholder="Escribe una tarea..."
                required
              />
            </div>

            <div>
              <label for="priority-input">Prioridad</label>
              <select id="priority-input">
                <option value="low">Baja</option>
                <option value="medium">Media</option>
                <option value="high">Alta</option>
              </select>
            </div>

            <button type="submit">Añadir</button>
          </form>

          <div class="controls">
            <div id="filters" class="filters">
              <button data-filter="all">Todas</button>
              <button data-filter="completed">Completadas</button>
              <button data-filter="pending">Pendientes</button>
            </div>

            <div class="sort-box">
              <label for="sort-input">Ordenar por</label>
              <select id="sort-input">
                <option value="created">Creación</option>
                <option value="alphabetical">Alfabético</option>
                <option value="priority">Prioridad</option>
              </select>
            </div>
          </div>

          <div class="search-box">
            <label for="search-input">Buscar tarea</label>
            <input type="text" id="search-input" placeholder="Buscar..." />
          </div>

          <div class="actions">
            <button id="complete-all" type="button">Completar todas</button>
            <button id="clear-completed" type="button">
              Eliminar completadas
            </button>
          </div>

          <h2 id="tasks-title">Lista de tareas</h2>
          <ul id="task-list" class="task-list"></ul>
        </section>

        <aside class="stats-panel" aria-labelledby="stats-title">
          <h2 id="stats-title">Estadísticas</h2>
          <p>Total: <span id="total">0</span></p>
          <p>Completadas: <span id="completed">0</span></p>
          <p>Pendientes: <span id="pending">0</span></p>
        </aside>
      </main>

      <footer class="footer">
        <p>Ismael Contelles - 2026</p>
      </footer>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
